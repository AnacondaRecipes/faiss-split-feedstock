anaconda_config_version: 1
upstream_sources:
  - github:
      identifier: facebookresearch/faiss
      use_max_tag: true
      exclude_regex: ^v?20180223$
      include_regex: ^v?\d+(?:\.\d+)*$
      from_pattern: ^v?(\d+(?:\.\d+)*.*)$
      to_pattern: \1
    packages:
      - libfaiss
      - libfaiss-avx2
      - faiss
