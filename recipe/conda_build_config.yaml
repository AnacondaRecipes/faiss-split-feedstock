cxx_compiler:          # [win]
  - vs2019               # [win]

# CUDA builds are gated behind ANACONDA_ROCKET_ENABLE_CUDA to prevent automatic CI builds.
# GPU variants must be built manually on dev instances with CUDA support.
# This follows the same pattern as llama.cpp-feedstock.
cuda_compiler_version:
  - None                                                                       # CPU variant - always built
  - 12.8               # [ANACONDA_ROCKET_ENABLE_CUDA and (linux64 or win)]  # GPU variant - manual only

python:
  - 3.10
  - "3.11"
  - "3.12"
  - "3.13"           # [not osx]
  # Python 3.13 builds currently fail on macOS arm64 (upstream SWIG bindings not ready),
  # so keep it enabled elsewhere but skip on osx for now.
  # Upstream issue: https://github.com/facebookresearch/faiss/issues/3985

blas_impl:
  - mkl              # [not (aarch64 or ppc64le or s390x or arm64)]
  - openblas         # [aarch64 or ppc64le or s390x or arm64]
